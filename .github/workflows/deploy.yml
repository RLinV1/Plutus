name: Deploy to AWS (Elastic Beanstalk)

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install EB CLI
        run: pip install awsebcli --quiet

      - name: Swap in AWS compose file
        run: |
          cp docker-compose.yml docker-compose.dev.yml
          cp docker-compose.aws.yml docker-compose.yml

      - name: Initialize EB app
        run: |
          eb init "${{ vars.EB_APP_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --platform "Docker"

      - name: Ensure environment exists (recreate if terminated)
        run: |
          ENV="${{ vars.EB_ENV_NAME }}"
          if eb status "$ENV" >/dev/null 2>&1; then
            echo "Environment $ENV exists — will deploy to it."
            eb use "$ENV"
          else
            echo "Environment $ENV not found (terminated?) — creating it."
            # Single-instance Docker, matching scripts/eb-create.sh. Secrets are
            # applied by the next step (eb setenv), which triggers an update.
            eb create "$ENV" \
              --instance-type t3.medium \
              --single \
              --platform "Docker running on 64bit Amazon Linux 2023" \
              --region "${{ env.AWS_REGION }}"
          fi

      - name: Sync secrets to EB env vars
        run: |
          _parse() {
            python3 -c "
          import sys, json
          s = sys.stdin.read().strip()
          try:
            d = json.loads(s)
            print(list(d.values())[0])
          except Exception:
            print(s)
          "
          }
          ANTHROPIC_KEY=$(aws secretsmanager get-secret-value \
            --secret-id plutus/anthropic-api-key \
            --query SecretString --output text | _parse)
          POSTGRES_PASS=$(aws secretsmanager get-secret-value \
            --secret-id plutus/postgres-password \
            --query SecretString --output text | _parse)
          CLERK_JWKS=""
          CLERK_PK=""
          TURNSTILE_KEY=""
          if aws secretsmanager describe-secret --secret-id plutus/clerk-jwks-url 2>/dev/null; then
            CLERK_JWKS=$(aws secretsmanager get-secret-value \
              --secret-id plutus/clerk-jwks-url \
              --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/clerk-publishable-key 2>/dev/null; then
            CLERK_PK=$(aws secretsmanager get-secret-value \
              --secret-id plutus/clerk-publishable-key \
              --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/turnstile-site-key 2>/dev/null; then
            TURNSTILE_KEY=$(aws secretsmanager get-secret-value \
              --secret-id plutus/turnstile-site-key \
              --query SecretString --output text | _parse)
          fi
          # Billing / Stripe (all optional — quota still enforced without them).
          STRIPE_KEY=""
          STRIPE_WH=""
          STRIPE_PRO=""
          STRIPE_PRO_MAX=""
          UNLIMITED_IDS=""
          if aws secretsmanager describe-secret --secret-id plutus/stripe-secret-key 2>/dev/null; then
            STRIPE_KEY=$(aws secretsmanager get-secret-value \
              --secret-id plutus/stripe-secret-key --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/stripe-webhook-secret 2>/dev/null; then
            STRIPE_WH=$(aws secretsmanager get-secret-value \
              --secret-id plutus/stripe-webhook-secret --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/stripe-price-pro 2>/dev/null; then
            STRIPE_PRO=$(aws secretsmanager get-secret-value \
              --secret-id plutus/stripe-price-pro --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/stripe-price-pro-max 2>/dev/null; then
            STRIPE_PRO_MAX=$(aws secretsmanager get-secret-value \
              --secret-id plutus/stripe-price-pro-max --query SecretString --output text | _parse)
          fi
          if aws secretsmanager describe-secret --secret-id plutus/unlimited-user-ids 2>/dev/null; then
            UNLIMITED_IDS=$(aws secretsmanager get-secret-value \
              --secret-id plutus/unlimited-user-ids --query SecretString --output text | _parse)
          fi
          eb setenv \
            ANTHROPIC_API_KEY="$ANTHROPIC_KEY" \
            POSTGRES_PASSWORD="$POSTGRES_PASS" \
            CLERK_JWKS_URL="$CLERK_JWKS" \
            VITE_CLERK_PUBLISHABLE_KEY="$CLERK_PK" \
            VITE_TURNSTILE_SITE_KEY="$TURNSTILE_KEY" \
            STRIPE_SECRET_KEY="$STRIPE_KEY" \
            STRIPE_WEBHOOK_SECRET="$STRIPE_WH" \
            STRIPE_PRICE_PRO="$STRIPE_PRO" \
            STRIPE_PRICE_PRO_MAX="$STRIPE_PRO_MAX" \
            UNLIMITED_USER_IDS="$UNLIMITED_IDS"

      - name: Wait for environment to be ready
        run: |
          for i in {1..20}; do
            STATUS=$(eb status | grep "Status:" | awk '{print $2}')
            echo "Environment status: $STATUS"
            if [ "$STATUS" = "Ready" ]; then break; fi
            sleep 30
          done

      - name: Deploy
        run: |
          eb deploy \
            --timeout 20 \
            --label "gh-${{ github.sha }}"

      - name: Restore dev compose
        if: always()
        run: |
          cp docker-compose.dev.yml docker-compose.yml
          rm -f docker-compose.dev.yml

      - name: Summary
        run: |
          echo "### Deployed to Elastic Beanstalk" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA**: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **App**: \`${{ vars.EB_APP_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Env**: \`${{ vars.EB_ENV_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
