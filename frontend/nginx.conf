server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API. A variable upstream + Docker's embedded DNS resolver
    # lets nginx re-resolve `api` as replicas scale up/down.
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $upstream http://api:8000;
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (/api/ask_stream): stream chunks through instead of buffering the
        # whole response, so the chat appears token-by-token.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # WebSocket stream (/ws/stream): live quotes + alert notifications.
    # Requires the Upgrade/Connection handshake headers and a long read
    # timeout (the socket is idle between 20s poll cycles).
    location /ws/ {
        set $upstream_ws http://api:8000;
        proxy_pass $upstream_ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # SPA fallback — every non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
